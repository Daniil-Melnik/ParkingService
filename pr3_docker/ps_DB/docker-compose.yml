services:
  db:
    image: postgres:16
    container_name: Parking_DB
    restart: always
    environment:
      POSTGRES_PASSWORD: 12345678
      POSTGRES_USER: admin
      POSTGRES_DB: parking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d parking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking-network

volumes:
  postgres_data:

networks:
  parking-network:
    external: true